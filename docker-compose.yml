version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_dev_platform
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]
  api:
    build: ./apps/api
    env_file: .env
    ports: ["4000:4000"]
    depends_on: [postgres, redis]
  web:
    build: ./apps/web
    env_file: .env
    ports: ["3000:3000"]
    depends_on: [api]
  worker:
    build: ./apps/worker
    env_file: .env
    depends_on: [api, redis, postgres]
  runner:
    build: ./apps/runner
    env_file: .env
    ports: ["4010:4010"]
    depends_on: [redis]
